<!DOCTYPE html>
<html>
<head>
    <title>MindWatch 💛</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #F3F1E9;
        }

        /* MAIN SECTION */
        .container {
            margin-top: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 90px);
        }

        .card {
            width: 80%;
            max-width: 900px;
            background: #CDE4D3;
            border-radius: 30px;
            padding: 60px 40px;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* TEXT */
        .card h2 {
            color: #2f5d50;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .card p {
            color: #6b7d75;
            font-size: 14px;
            margin-bottom: 50px;
        }

        .options {
            display: flex;
            justify-content: space-between;
            gap: 30px;
        }

        .option-card {
            flex: 1;
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            text-decoration: none;
            color: #2f5d50;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .option-card h3 {
            margin-bottom: 10px;
        }

        .option-card p {
            font-size: 14px;
            color: #6b7d75;
        }

        .option-card:hover {
            transform: translateY(-8px);
            background: #9fcbb3;
            color: #1f4037;
        }

        /* ANIMATION */
        .card {
            animation: fadeUp 0.8s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    {% include 'partials/nav.html' %}

    <!-- MAIN -->
    <div class="container">
        <div class="card">

            <h2>How would you like to continue?</h2>
            <p>Choose a way that feels right for you</p>

            <div class="options">

                <a href="/text_input" class="option-card">
                    <h3>Express in words</h3>
                    <p>Write what you're feeling freely</p>
                </a>

                <a href="/checklist_general" class="option-card">
                    <h3>Take a checklist</h3>
                    <p>Answer guided questions</p>
                </a>

            </div>

        </div>
    </div>

</body>
</html>
